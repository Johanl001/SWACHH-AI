# SWACHH-AI Mosquitto MQTT Broker Configuration

# Standard MQTT listener
listener 1883
protocol mqtt

# WebSocket listener (for browser/dashboard)
listener 9001
protocol websockets

# Authentication
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl.conf

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type all

# Connection settings
max_keepalive 120
max_connections 200
